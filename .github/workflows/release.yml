name: Release

# Tag 触发（推送 v1.0.0 / v1.0.0-rc.1 等标签时构建并发布 Release APK）
# 当前使用 debug 签名（debugLocal keystore）产出可安装的内测包。
# 生产发布签名升级路径：在 GitHub Secrets 配置 RELEASE_KEYSTORE_BASE64 /
# RELEASE_KEYSTORE_PASSWORD / RELEASE_KEY_ALIAS / RELEASE_KEY_PASSWORD，
# 然后将下方 assembleDebug 替换为 assembleRelease 并注入签名配置。

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app
    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android-app/.gradle
          key: gradle-release-${{ runner.os }}-${{ hashFiles('android-app/**/*.gradle*') }}
          restore-keys: gradle-release-${{ runner.os }}-

      - name: Generate debug keystore
        run: |
          if [ ! -f app/debug.keystore ]; then
            keytool -genkey -v \
              -keystore app/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK (debug-signed for internal test)
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Rename APK with tag
        id: rename
        run: |
          tag=${GITHUB_REF#refs/tags/}
          mv app/build/outputs/apk/debug/app-debug.apk "app/build/outputs/apk/debug/OneTake-${tag}.apk"
          echo "apk=app/build/outputs/apk/debug/OneTake-${tag}.apk" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.rename.outputs.tag }}
          name: ${{ steps.rename.outputs.tag }}
          generate_release_notes: true
          files: android-app/${{ steps.rename.outputs.apk }}
          body: |
            ## OneTake ${{ steps.rename.outputs.tag }}

            **内测包（debug 签名）**：可直接安装测试，不建议用于生产分发。

            ### 升级到生产签名
            1. 在仓库 Settings → Secrets 配置 `RELEASE_KEYSTORE_BASE64`、`RELEASE_KEYSTORE_PASSWORD`、`RELEASE_KEY_ALIAS`、`RELEASE_KEY_PASSWORD`；
            2. 修改 `.github/workflows/release.yml` 构建 `assembleRelease` 并解码注入 keystore；
            3. 移除本提示文案。
