name: 功能请求
description: 提出新功能或改进建议
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢建议！请先确认该功能是否符合 [PRD](../docs/prd.md) 的 MVP 范围（V1.5 及以后的功能请标注）。

  - type: dropdown
    id: module
    attributes:
      label: 影响模块
      options:
        - Android App
        - Web 原型
        - CI/CD
        - 文档
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 当前遇到了什么不便？为什么现有方案不够？
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望它怎么工作？可附交互草图或参考应用。
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: 优先级
      options:
        - MVP 必须
        - V1.5 及以后
        - 锦上添花
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 为什么不这么做？
    validations:
      required: false
